apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-config
  namespace: hermes
data:
  ENVIRONMENT: "production"
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_NAME: "hermes"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  RABBITMQ_HOST: "rabbitmq"
  RABBITMQ_PORT: "5672"
  CELERY_BROKER_URL: "redis://redis:6379/1"
  CELERY_RESULT_BACKEND: "redis://redis:6379/1"
  QDRANT_HOST: "qdrant"
  QDRANT_PORT: "6333"
  MLFLOW_TRACKING_URI: "http://mlflow:5000"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4317"

---
apiVersion: v1
kind: Secret
metadata:
  name: hermes-secret
  namespace: hermes
type: Opaque
data:
  # Base64 encoded defaults: "postgres" / "postgres" / "CHANGE_THIS_IN_PRODUCTION_SECRET_KEY_1234567890"
  POSTGRES_USER: "cG9zdGdyZXM="
  POSTGRES_PASSWORD: "cG9zdGdyZXM="
  JWT_SECRET_KEY: "Q0hBTkdFX1RISVNfSU5fUFJPRFVDVElPTl9TRUNSRVRfS0VZXzEyMzQ1Njc4OTA="
